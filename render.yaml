services:
  - type: web
    name: compensation-intelligence-system
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: free
    envVars:
      - key: LEVELLENS_HOST
        value: 0.0.0.0
      - key: LEVELLENS_PORT
        value: 10000
      - key: LEVELLENS_DATA_DIR
        value: /app/data
      - key: LEVELLENS_DB_PATH
        value: /app/data/levellens.sqlite3
      - key: LEVELLENS_SESSION_DAYS
        value: 7
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
